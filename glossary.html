<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossary | Armored Noir - Check20</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/glossary.css">
    <link rel="icon" href="/assets/icons/favicon.png" type="image/png">
    <script src="scripts/main.js" defer></script>
    <script src="scripts/sidebar.js" defer></script>
    <script src="scripts/header.js" defer></script>
    <script src="scripts/tooltips.js" defer></script>
    <script src="scripts/glossary.js" defer></script>
</head>
<body data-page-title="Glossary">
    <div id="header-placeholder"></div>
    <main>
        <div class="gloss-toolbar">
            <div id="gloss-type-tabs" class="gloss-type-tabs"></div>
            <div class="gloss-search-row">
                <input type="search" id="gloss-search" placeholder="Search rules, terms, properties…" autocomplete="off" spellcheck="false">
                <span id="gloss-count" class="gloss-count"></span>
            </div>
        </div>
        <div id="gloss-grid"></div>
    </main>
    <div id="sidebar-placeholder"></div>
</body>
</html>
