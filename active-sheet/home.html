<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ARC20 - Active Sheet</title>
    <link rel="icon" href="../assets/icons/check20-app.png" type="image/png" />
    <link rel="apple-touch-icon" href="../assets/icons/check20-app.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1b2c2c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ARC20" />
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');</script>
    <link rel="stylesheet" href="styles/home.css" />
    <script type="module" src="../scripts/firebase.js"></script>
    <script src="../scripts/home.js" defer></script>
</head>

<body>
    <main class="home-screen">

        <div class="home-hero">
            <div class="home-logo">Armored Noir</div>
            <div class="home-subtitle">Companion Playsheet</div>
        </div>

        <!-- Active character -->
        <div class="home-section" id="home-current" hidden>
            <div class="home-section-label">Active Character</div>
            <div class="home-current-card">
                <div class="home-current-info">
                    <span class="home-current-name" id="home-char-name">-</span>
                    <span class="home-current-meta" id="home-char-meta"></span>
                </div>
                <div class="home-current-actions">
                    <button id="btn-save-current" class="home-btn-sm" type="button">Save</button>
                    <button id="btn-continue" class="home-btn home-btn--primary home-btn--sm" type="button">Continue ▶</button>
                </div>
            </div>
        </div>

        <!-- Saved characters -->
        <div class="home-section" id="home-saves-section" hidden>
            <div class="home-section-label">Saved Characters</div>
            <div class="saves-list" id="saves-list"></div>
            <button id="saves-show-more" class="saves-toggle-btn" type="button" hidden></button>
        </div>

        <!-- Main actions -->
        <div class="home-actions">
            <button id="btn-new" class="home-btn" type="button">+ New Character</button>
            <button id="btn-import" class="home-btn" type="button">↑ Import File</button>
            <input id="file-load" type="file" accept=".json" hidden />
        </div>

        <div class="home-divider"></div>

        <div class="home-actions">
            <a href="global-chat.html" class="home-btn home-btn--narrator home-btn--link">
                🥃 The Speakeasy
            </a>
            <a href="narrator.html" class="home-btn home-btn--narrator home-btn--link">
                <img src="../assets/icons/reference.png" class="home-btn-icon" alt="" />
                Narrator Mode
            </a>
        </div>

        <div class="home-divider"></div>

        <!-- Join / Active Session -->
        <div class="home-section" id="home-join-section">
            <div class="home-section-label">Session</div>

            <!-- Active session banner (shown when already in a room) -->
            <div id="home-active-session" hidden>
                <div class="home-session-banner">
                    <span>Active: <strong id="home-session-code"></strong></span>
                    <button id="btn-leave-session" class="home-btn home-btn--ghost home-btn--leave" type="button">Leave</button>
                </div>
                <button id="btn-rejoin-session" class="home-btn home-btn--primary" type="button">▶ Rejoin Session</button>
            </div>

            <!-- Join form (shown when not in a room) -->
            <div id="home-join-form-wrap">
                <div class="home-join-row">
                    <input id="join-code-input" class="home-join-input" type="text"
                        placeholder="Room code…" maxlength="6" autocomplete="off" />
                    <button id="btn-join-session" class="home-btn home-btn--primary" type="button" disabled>Join</button>
                </div>
                <button id="btn-create-room" class="home-btn" type="button" disabled>+ Create Room</button>

                <!-- Are you sure confirm (shown before creating when already in a room) -->
                <div id="home-create-confirm" class="home-confirm-box" hidden>
                    <p class="home-confirm-text">You're already in room <strong id="confirm-room-code"></strong>. Creating a new room means you'll need a new code. Are you sure?</p>
                    <div class="home-confirm-actions">
                        <button id="btn-create-confirm-yes" class="home-btn home-btn--primary home-btn--confirm-danger" type="button">Yes, New Room</button>
                        <button id="btn-create-confirm-no" class="home-btn home-btn--ghost" type="button">Cancel</button>
                    </div>
                </div>
            </div>

            <p id="join-status" class="home-join-status" hidden></p>
        </div>

        <div class="home-actions">
            <a href="../../index.html" class="home-btn home-btn--ghost home-btn--link">
                ← Main Website
            </a>
        </div>

    </main>

    <!-- Campaign Entry Screen (shown when joining a named room) -->
    <div id="home-entry-screen" class="home-entry-screen" hidden>
        <div class="home-entry-inner">
            <div class="home-entry-eyebrow">You are entering</div>
            <div class="home-entry-name" id="entry-room-name"></div>
            <div class="home-entry-divider"></div>
            <div class="home-entry-msg" id="entry-room-msg"></div>
            <button id="btn-enter-room" class="home-btn home-btn--primary home-entry-btn" type="button">Enter</button>
        </div>
    </div>

</body>

</html>
