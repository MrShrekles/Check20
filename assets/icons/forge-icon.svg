<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#1b2c2c"/>

  <!-- Anvil horn (left taper) -->
  <polygon points="3,20 11,20 11,15" fill="#b8a06a"/>

  <!-- Anvil top face -->
  <rect x="11" y="12" width="17" height="8" rx="1.5" fill="#c8b07a"/>

  <!-- Anvil waist -->
  <rect x="15" y="20" width="9" height="2" fill="#a08858"/>

  <!-- Anvil base -->
  <rect x="13" y="22" width="13" height="5" rx="1.5" fill="#a08858"/>

  <!-- Sparks -->
  <circle cx="22" cy="8"  r="2"   fill="#ffd700"/>
  <circle cx="27" cy="11" r="1.4" fill="#ffaa00"/>
  <circle cx="18" cy="6"  r="1.2" fill="#ff8c00"/>
  <line x1="22" y1="12" x2="26" y2="7"  stroke="#ffd700" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="12" x2="18" y2="7"  stroke="#ffaa00" stroke-width="0.8" stroke-linecap="round"/>
</svg>
